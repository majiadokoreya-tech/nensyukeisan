<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>夫婦年収管理アプリ</title>
<style>
:root{--bg:#eef3fb;--card:#fff;--text:#14213d;--muted:#64748b;--main:#2563eb;--main2:#1d4ed8;--ok:#16a34a;--warn:#f59e0b;--danger:#dc2626;--border:#e2e8f0;--soft:#f8fafc;--shadow:0 8px 24px rgba(15,23,42,.08)}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{max-width:980px;margin:auto;padding:14px 12px 88px}.hero{background:linear-gradient(135deg,#2563eb,#38bdf8);color:#fff;border-radius:22px;padding:18px;margin:6px 0 14px;box-shadow:var(--shadow)}.hero h1{margin:0 0 6px;font-size:25px}.hero p{margin:0;opacity:.95;font-size:14px}.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 10px;z-index:10}.tab{border:0;border-radius:14px;padding:10px 4px;font-weight:900;background:#e5e7eb;color:#334155;font-size:13px}.tab.active{background:var(--main);color:#fff}.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:15px;margin-bottom:12px;box-shadow:var(--shadow)}h2{font-size:19px;margin:0 0 12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.biggrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi{border:1px solid var(--border);border-radius:18px;padding:13px;background:var(--soft)}.kpi .label{font-size:12px;color:var(--muted);font-weight:800}.kpi .num{font-size:22px;font-weight:1000;margin-top:5px;letter-spacing:-.5px}.kpi.primary{background:#eff6ff;border-color:#bfdbfe}.kpi.ok{background:#ecfdf5;border-color:#bbf7d0}.kpi.warn{background:#fffbeb;border-color:#fde68a}.kpi.danger{background:#fef2f2;border-color:#fecaca}.wide{grid-column:1/-1}.status{border-radius:16px;padding:12px;font-weight:900;line-height:1.45;margin-top:10px}.status.ok{background:#dcfce7;color:#14532d}.status.warn{background:#fef3c7;color:#78350f}.status.danger{background:#fee2e2;color:#7f1d1d}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;border-bottom:1px solid var(--border);padding:10px 0}.row:last-child{border-bottom:0}.row b{font-size:15px}.row span{font-weight:900;text-align:right}.selectrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}label{font-size:13px;color:#334155;font-weight:900;margin-bottom:5px;display:block}select,input,textarea{width:100%;border:1px solid var(--border);border-radius:14px;padding:11px;font-size:16px;background:#fff}textarea{min-height:76px;resize:vertical}.month{border:1px solid var(--border);border-radius:18px;margin:10px 0;background:#fff;overflow:hidden}.month summary{list-style:none;cursor:pointer;padding:13px;display:flex;justify-content:space-between;align-items:center;background:#f8fafc}.month summary::-webkit-details-marker{display:none}.m-title{font-weight:1000}.m-sum{font-size:12px;color:var(--muted);text-align:right}.m-body{padding:12px}.inputgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}button{border:0;border-radius:14px;padding:12px;font-size:15px;font-weight:1000}.blue{background:var(--main);color:#fff}.gray{background:#e5e7eb;color:#111827}.red{background:#fee2e2;color:#991b1b}.green{background:#dcfce7;color:#14532d}.mini{padding:8px 9px;font-size:12px;border-radius:10px}.hidden{display:none!important}.note{font-size:12px;color:var(--muted);line-height:1.55}.tablewrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px;min-width:660px}th,td{border-bottom:1px solid var(--border);padding:9px 6px;text-align:right;white-space:nowrap}th:first-child,td:first-child{text-align:left}.barbox{display:grid;gap:10px}.barrow{display:grid;grid-template-columns:54px 1fr 90px;gap:8px;align-items:center;font-size:12px}.bar{height:14px;background:#e5e7eb;border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#60a5fa,#2563eb);border-radius:999px}.family{display:grid;gap:10px}.person{border:1px solid var(--border);background:#fff;border-radius:18px;padding:12px}.person h3{margin:0 0 8px;font-size:16px}.actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}@media(min-width:760px){.biggrid{grid-template-columns:repeat(4,1fr)}.inputgrid{grid-template-columns:repeat(4,1fr)}.tabs{position:static;border:0;border-radius:20px;margin-bottom:12px;box-shadow:var(--shadow)}.app{padding-bottom:20px}}
</style>
</head>
<body>
<div class="app">
  <div class="hero"><h1>夫婦年収管理</h1><p>毎月入力・年間合計・妻の年収ラインを見やすく管理</p></div>
  <div class="tabs">
    <button class="tab active" data-tab="home" onclick="showTab('home')">ホーム</button>
    <button class="tab" data-tab="input" onclick="showTab('input')">入力</button>
    <button class="tab" data-tab="summary" onclick="showTab('summary')">集計</button>
    <button class="tab" data-tab="family" onclick="showTab('family')">家族</button>
  </div>

  <section id="homeSec">
    <div class="card">
      <div class="selectrow">
        <div><label>表示する年</label><select id="yearSelect" onchange="changeYear(this.value)"></select></div>
        <div><label>入力単位</label><select id="unitMode" onchange="saveSettings(); renderAll()"><option value="yen">円</option><option value="man">万円</option></select></div>
      </div>
    </div>
    <div class="biggrid" id="dashboardCards"></div>
    <div class="card"><h2>妻の年収ライン</h2><div id="wifeStatus"></div><div id="lineRows"></div></div>
    <div class="card"><h2>今年の入力状況</h2><div id="inputProgress"></div></div>
  </section>

  <section id="inputSec" class="hidden">
    <div class="card">
      <h2>月別入力</h2>
      <p class="note">入力すると自動保存。賞与も1行として管理できます。</p>
      <div id="monthsArea"></div>
      <div class="btns"><button class="gray" onclick="addYear()">新しい年を追加</button><button class="red" onclick="clearYear()">この年をクリア</button></div>
    </div>
  </section>

  <section id="summarySec" class="hidden">
    <div class="card"><h2>年ごとの比較</h2><div class="tablewrap"><table id="yearTable"></table></div></div>
    <div class="card"><h2>世帯年収グラフ</h2><div class="barbox" id="houseBars"></div></div>
    <div class="card"><h2>バックアップ</h2><div class="btns"><button class="gray" onclick="exportData()">バックアップ出力</button><button class="blue" onclick="importData()">バックアップ読込</button></div><textarea id="backupText" placeholder="バックアップ文字をここに貼り付け"></textarea></div>
  </section>

  <section id="familySec" class="hidden">
    <div class="card"><h2>家族メモ</h2><p class="note">共有は後からでOK。まずはこのスマホ内に保存します。</p><div class="family" id="familyArea"></div><button class="blue" style="width:100%;margin-top:10px" onclick="saveFamilyFromInputs()">家族情報を保存</button></div>
  </section>
</div>

const defaultFamily=[{name:'大輔',role:'私',birthday:'',memo:'年収・手取り管理'},{name:'香代ちゃん',role:'妻',birthday:'',memo:'130万・150万・180万ライン確認'},{name:'長女',role:'子ども',birthday:'',memo:'教育費メモ'},{name:'次女',role:'子ども',birthday:'',memo:'教育費メモ'}];
let data=loadData(), currentYear=String(Math.max(...Object.keys(data).map(Number)));
function clone(o){return JSON.parse(JSON.stringify(o))}function loadData(){try{return JSON.parse(localStorage.getItem(KEY))||clone(defaultData)}catch(e){return clone(defaultData)}}function saveData(){localStorage.setItem(KEY,JSON.stringify(data))}function yen(n){return (Number(n)||0).toLocaleString('ja-JP')+'円'}function val(n){return Number(n)||0}function setting(){try{return JSON.parse(localStorage.getItem(SETTINGS))||{unit:'yen'}}catch(e){return{unit:'yen'}}}function saveSettings(){localStorage.setItem(SETTINGS,JSON.stringify({unit:document.getElementById('unitMode').value}))}function unitIn(v){let n=Number(v)||0;return document.getElementById('unitMode').value==='man'?Math.round(n*10000):Math.round(n)}function unitOut(v){return document.getElementById('unitMode').value==='man'&&v?Math.round(v/10000):v||''}function emptyYear(){return{months:labels.map(x=>({label:x,myGross:0,myTake:0,wifeGross:0,wifeTake:0}))}}function totals(y){const m=(data[y]||emptyYear()).months;return m.reduce((a,r)=>{a.myGross+=val(r.myGross);a.myTake+=val(r.myTake);a.wifeGross+=val(r.wifeGross);a.wifeTake+=val(r.wifeTake);return a},{myGross:0,myTake:0,wifeGross:0,wifeTake:0})}function inputCount(y){return (data[y]?.months||[]).filter(r=>val(r.myGross)+val(r.myTake)+val(r.wifeGross)+val(r.wifeTake)>0).length}function showTab(t){['home','input','summary','family'].forEach(x=>{document.getElementById(x+'Sec').classList.toggle('hidden',x!==t);document.querySelector(`[data-tab="${x}"]`).classList.toggle('active',x===t)});renderAll()}function changeYear(y){currentYear=String(y);renderAll()}function renderYearSelect(){const sel=document.getElementById('yearSelect');const yrs=Object.keys(data).map(Number).sort((a,b)=>b-a);sel.innerHTML=yrs.map(y=>`<option value="${y}">${y}年</option>`).join('');sel.value=currentYear}function renderDashboard(){const t=totals(currentYear),house=t.myGross+t.wifeGross,take=t.myTake+t.wifeTake,rate=house?Math.round(take/house*1000)/10:0;document.getElementById('dashboardCards').innerHTML=`<div class="kpi primary"><div class="label">世帯年収</div><div class="num">${yen(house)}</div></div><div class="kpi ok"><div class="label">世帯手取り</div><div class="num">${yen(take)}</div></div><div class="kpi"><div class="label">月平均 年収</div><div class="num">${yen(Math.round(house/12))}</div></div><div class="kpi"><div class="label">手取り率</div><div class="num">${rate}%</div></div><div class="kpi wide"><div class="label">${currentYear}年の内訳</div><div class="num">私 ${yen(t.myGross)} ／ 妻 ${yen(t.wifeGross)}</div></div>`;renderWifeLines(t.wifeGross);renderProgress()}function renderWifeLines(w){const box=document.getElementById('wifeStatus');let cls='ok',msg='130万円以内。扶養ラインを意識するなら安全寄り。';if(w>1800000){cls='danger';msg='180万円超。扶養より世帯手取り重視で考えるライン。'}else if(w>1500000){cls='warn';msg='150万円超〜180万円以内。働き損にならないか確認したいライン。'}else if(w>1300000){cls='warn';msg='130万円超〜150万円以内。社会保険・扶養条件の確認ライン。'}box.innerHTML=`<div class="status ${cls}">妻の年収：${yen(w)}<br>${msg}</div>`;document.getElementById('lineRows').innerHTML=[1300000,1500000,1800000].map(l=>{const d=l-w;return `<div class="row"><b>${l/10000}万円ライン</b><span>${d>=0?'あと '+yen(d):yen(Math.abs(d))+' 超過'}</span></div>`}).join('')}function renderProgress(){const c=inputCount(currentYear),pct=Math.round(c/14*100);document.getElementById('inputProgress').innerHTML=`<div class="barrow"><b>${c}/14</b><div class="bar"><div class="fill" style="width:${pct}%"></div></div><span>${pct}%入力</span></div><p class="note">1月〜12月と賞与2回を合わせて14項目です。</p>`}function renderMonths(){const m=data[currentYear]?.months||emptyYear().months;document.getElementById('monthsArea').innerHTML=m.map((r,i)=>{const sum=val(r.myGross)+val(r.wifeGross);return `<details class="month" ${i<6?'open':''}><summary><div class="m-title">${r.label}</div><div class="m-sum">世帯 ${yen(sum)}<br>私 ${yen(r.myGross)} / 妻 ${yen(r.wifeGross)}</div></summary><div class="m-body"><div class="inputgrid"><div><label>私 額面</label><input type="number" inputmode="numeric" value="${unitOut(r.myGross)}" oninput="setMonth(${i},'myGross',this.value)"></div><div><label>私 手取り</label><input type="number" inputmode="numeric" value="${unitOut(r.myTake)}" oninput="setMonth(${i},'myTake',this.value)"></div><div><label>妻 額面</label><input type="number" inputmode="numeric" value="${unitOut(r.wifeGross)}" oninput="setMonth(${i},'wifeGross',this.value)"></div><div><label>妻 手取り</label><input type="number" inputmode="numeric" value="${unitOut(r.wifeTake)}" oninput="setMonth(${i},'wifeTake',this.value)"></div></div></div></details>`}).join('')}function setMonth(i,k,v){if(!data[currentYear])data[currentYear]=emptyYear();data[currentYear].months[i][k]=unitIn(v);saveData();renderDashboard()}function renderSummary(){const years=Object.keys(data).map(Number).sort((a,b)=>b-a);document.getElementById('yearTable').innerHTML=`<thead><tr><th>年</th><th>世帯年収</th><th>世帯手取り</th><th>私額面</th><th>妻額面</th><th>入力</th></tr></thead><tbody>${years.map(y=>{const t=totals(y);return `<tr><td>${y}</td><td>${yen(t.myGross+t.wifeGross)}</td><td>${yen(t.myTake+t.wifeTake)}</td><td>${yen(t.myGross)}</td><td>${yen(t.wifeGross)}</td><td>${inputCount(y)}/14</td></tr>`}).join('')}</tbody>`;const max=Math.max(1,...years.map(y=>{const t=totals(y);return t.myGross+t.wifeGross}));document.getElementById('houseBars').innerHTML=years.slice().reverse().map(y=>{const t=totals(y),v=t.myGross+t.wifeGross,p=Math.round(v/max*100);return `<div class="barrow"><b>${y}</b><div class="bar"><div class="fill" style="width:${p}%"></div></div><span>${yen(v)}</span></div>`}).join('')}function familyData(){try{return JSON.parse(localStorage.getItem(FAMILY))||clone(defaultFamily)}catch(e){return clone(defaultFamily)}}function renderFamily(){const f=familyData();document.getElementById('familyArea').innerHTML=f.map((p,i)=>`<div class="person"><h3>${p.role}</h3><div class="grid"><div><label>名前</label><input id="fname${i}" value="${p.name||''}"></div><div><label>生年月日</label><input id="fbirth${i}" type="date" value="${p.birthday||''}"></div></div><label>メモ</label><textarea id="fmemo${i}">${p.memo||''}</textarea></div>`).join('')}function saveFamilyFromInputs(){const f=defaultFamily.map((p,i)=>({role:p.role,name:document.getElementById('fname'+i).value,birthday:document.getElementById('fbirth'+i).value,memo:document.getElementById('fmemo'+i).value}));localStorage.setItem(FAMILY,JSON.stringify(f));alert('家族情報を保存しました')}function addYear(){const y=prompt('追加する年を入力してください',new Date().getFullYear());if(!y)return;if(!data[y])data[y]=emptyYear();currentYear=String(y);saveData();renderAll()}function clearYear(){if(!confirm(currentYear+'年の入力をクリアしますか？'))return;data[currentYear]=emptyYear();saveData();renderAll()}function exportData(){const text=JSON.stringify({data,family:familyData()},null,2);document.getElementById('backupText').value=text;navigator.clipboard?.writeText(text);alert('バックアップを表示しました。コピーできる端末ではコピーもされています。')}function importData(){try{const obj=JSON.parse(document.getElementById('backupText').value);if(obj.data)data=obj.data;else data=obj;saveData();if(obj.family)localStorage.setItem(FAMILY,JSON.stringify(obj.family));currentYear=String(Math.max(...Object.keys(data).map(Number)));renderAll();alert('読込しました')}catch(e){alert('読込できません。文字を確認してください')}}function renderAll(){document.getElementById('unitMode').value=setting().unit;renderYearSelect();renderDashboard();renderMonths();renderSummary();renderFamily()}if(!localStorage.getItem(KEY)){localStorage.setItem(KEY,JSON.stringify(defaultData))}renderAll();
</script>
</body>
</html>
