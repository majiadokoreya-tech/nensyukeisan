<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夫婦年収管理アプリ</title>
  <style>
    :root{
      --bg:#f4f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--main:#2563eb;--main-dark:#1d4ed8;--danger:#dc2626;--warn:#f59e0b;--ok:#16a34a;--border:#e5e7eb;--soft:#f9fafb;
    }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);padding:14px}.app{max-width:920px;margin:0 auto}h1{font-size:24px;margin:8px 0 4px}h2{font-size:20px;margin:0 0 12px}.sub{color:var(--muted);font-size:14px;margin-bottom:16px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 4px 12px rgba(0,0,0,.04)}label{display:block;font-weight:800;margin:12px 0 6px}input,textarea,select{width:100%;font-size:17px;padding:11px;border:1px solid var(--border);border-radius:12px;background:#fff}textarea{min-height:72px;resize:vertical}.top-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.result{background:var(--soft);border:1px solid var(--border);border-radius:14px;padding:12px}.result .title{font-size:13px;color:var(--muted)}.result .num{font-size:21px;font-weight:900;margin-top:4px}.status{border-radius:14px;padding:12px;font-weight:900;margin-top:12px;line-height:1.5}.ok{background:#dcfce7;color:#14532d}.warn{background:#fef3c7;color:#78350f}.danger{background:#fee2e2;color:#7f1d1d}.line-list{display:grid;gap:8px;margin-top:12px}.line-item{display:flex;justify-content:space-between;gap:10px;padding:10px;border:1px solid var(--border);border-radius:12px;background:#fff;font-size:15px}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}button{border:none;border-radius:12px;padding:12px 14px;font-size:16px;font-weight:900;cursor:pointer}.primary{background:var(--main);color:#fff}.primary:active{background:var(--main-dark)}.gray{background:#e5e7eb;color:#111827}.red{background:#fee2e2;color:#991b1b}.green{background:#dcfce7;color:#14532d}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}.tab{background:#e5e7eb;color:#111827}.tab.active{background:var(--main);color:#fff}.month-card{border:1px solid var(--border);border-radius:16px;background:#fff;padding:12px;margin-bottom:12px}.month-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}.month-title{font-size:18px;font-weight:900}.month-sum{font-size:13px;color:var(--muted);text-align:right}.month-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.small-note{font-size:12px;color:var(--muted);line-height:1.5}.records-table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:10px 6px;border-bottom:1px solid var(--border);text-align:right}th:first-child,td:first-child{text-align:left}.actions{display:flex;gap:6px;justify-content:flex-end}.mini{padding:7px 9px;font-size:13px;border-radius:9px}.empty{color:var(--muted);text-align:center;padding:14px}.hidden{display:none!important}.import-box{white-space:pre-wrap;font-family:ui-monospace,Menlo,monospace;font-size:12px}@media(min-width:720px){.result-grid{grid-template-columns:repeat(4,1fr)}.month-grid{grid-template-columns:repeat(4,1fr)}}
  </style>
</head>
<body>
<div class="app">
  <h1>夫婦年収管理アプリ</h1>
  <div class="sub">スプレッドシートの入力済みデータ入り。毎月入力 → 年間合計・世帯収入・妻の130万/150万/180万ラインを自動計算</div>

  <div class="tabs">
    <button id="tabInput" class="tab active" onclick="showTab('input')">毎月入力</button>
    <button id="tabRecords" class="tab" onclick="showTab('records')">年ごとの記録</button>
  </div>

  <section id="inputSection">
    <div class="card">
      <div class="top-grid">
        <div><label for="year">年</label><input id="year" type="number" inputmode="numeric" /></div>
        <div><label for="unitMode">入力単位</label><select id="unitMode"><option value="yen">円で入力</option><option value="man">万円で入力</option></select></div>
      </div>
      <p class="small-note">例：円入力なら「500000」、万円入力なら「50」と入力。入力すると自動保存されます。</p>
    </div>

    <div class="card">
      <h2>年間合計</h2>
      <div class="result-grid">
        <div class="result"><div class="title">私の額面</div><div class="num" id="myGrossTotal">0円</div></div>
        <div class="result"><div class="title">私の手取り</div><div class="num" id="myTakeTotal">0円</div></div>
        <div class="result"><div class="title">妻の額面</div><div class="num" id="wifeGrossTotal">0円</div></div>
        <div class="result"><div class="title">妻の手取り</div><div class="num" id="wifeTakeTotal">0円</div></div>
        <div class="result"><div class="title">世帯年収</div><div class="num" id="houseGrossTotal">0円</div></div>
        <div class="result"><div class="title">世帯手取り</div><div class="num" id="houseTakeTotal">0円</div></div>
        <div class="result"><div class="title">月平均 額面</div><div class="num" id="avgGross">0円</div></div>
        <div class="result"><div class="title">月平均 手取り</div><div class="num" id="avgTake">0円</div></div>
      </div>
      <div id="wifeStatus" class="status ok">妻の年収ラインを表示します</div>
      <div class="line-list" id="lineList"></div>
    </div>

    <div class="card">
      <h2>毎月入力</h2>
      <div id="monthsArea"></div>
      <label for="yearMemo">年間メモ</label>
      <textarea id="yearMemo" placeholder="例：妻は130万円以内予定、賞与あり、来年は180万円を目標など"></textarea>
      <div class="btns">
        <button class="primary" onclick="saveCurrentYear(true)">保存する</button>
        <button class="gray" onclick="clearCurrentYear()">この年をクリア</button>
      </div>
    </div>
  </section>

  <section id="recordsSection" class="hidden">
    <div class="card">
      <h2>年ごとの記録</h2>
      <div id="recordsArea"></div>
      <div class="btns">
        <button class="gray" onclick="exportData()">バックアップ出力</button>
        <button class="red" onclick="deleteAll()">全削除</button>
      </div>
      <label for="importText">バックアップ読込</label>
      <textarea id="importText" class="import-box" placeholder="バックアップ出力した文字を貼り付け"></textarea>
      <button class="primary" style="width:100%;margin-top:8px" onclick="importData()">読込する</button>
    </div>

    <div class="card">
      <h2>スプレッドシート取込</h2>
      <p class="small-note">今までの「年間収入」シートの入力済みデータを登録できます。</p>
      <button class="green" style="width:100%" onclick="loadPresetSheetData()">今回の入力済みデータを入れる</button>
    </div>
  </section>
</div>
<script>
const KEY='fuufu_income_monthly_records_v3_full_autofill';
const MONTHS=['1月','2月','3月','4月','5月','6月','夏季賞与','7月','8月','9月','10月','11月','冬季賞与','12月'];
const yen=n=>(Math.round(Number(n)||0)).toLocaleString('ja-JP')+'円';
const el=id=>document.getElementById(id);
function factor(){return el('unitMode').value==='man'?10000:1}
function displayValue(yenValue){const f=factor();return yenValue? (yenValue/f) : ''}
function inputToYen(v){return (Number(v)||0)*factor()}
function blankMonths(){return MONTHS.map(name=>({name,myGross:0,myTake:0,wifeGross:0,wifeTake:0,memo:''}))}
function loadRecords(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch{return[]}}
function storeRecords(records){localStorage.setItem(KEY,JSON.stringify(records))}
function currentYear(){return Number(el('year').value)||new Date().getFullYear()}
function getCurrentMonths(){return MONTHS.map((name,i)=>({name,myGross:inputToYen(el('myGross_'+i).value),myTake:inputToYen(el('myTake_'+i).value),wifeGross:inputToYen(el('wifeGross_'+i).value),wifeTake:inputToYen(el('wifeTake_'+i).value),memo:el('memo_'+i).value.trim()}))}
function totals(months){return months.reduce((a,m)=>{a.myGross+=Number(m.myGross)||0;a.myTake+=Number(m.myTake)||0;a.wifeGross+=Number(m.wifeGross)||0;a.wifeTake+=Number(m.wifeTake)||0;return a},{myGross:0,myTake:0,wifeGross:0,wifeTake:0})}
function renderMonths(months=blankMonths()){
  el('monthsArea').innerHTML=MONTHS.map((name,i)=>{const m=months[i]||{};return `<div class="month-card"><div class="month-head"><div class="month-title">${name}</div><div class="month-sum" id="sum_${i}">月合計 0円</div></div><div class="month-grid"><div><label>私の額面</label><input id="myGross_${i}" type="number" inputmode="decimal" value="${displayValue(m.myGross)}"></div><div><label>私の手取り</label><input id="myTake_${i}" type="number" inputmode="decimal" value="${displayValue(m.myTake)}"></div><div><label>妻の額面</label><input id="wifeGross_${i}" type="number" inputmode="decimal" value="${displayValue(m.wifeGross)}"></div><div><label>妻の手取り</label><input id="wifeTake_${i}" type="number" inputmode="decimal" value="${displayValue(m.wifeTake)}"></div></div><label>メモ</label><input id="memo_${i}" type="text" value="${escapeAttr(m.memo||'')}" placeholder="例：残業多め、賞与など"></div>`}).join('');
  document.querySelectorAll('#monthsArea input').forEach(x=>x.addEventListener('input',()=>{calc();autoSave()}));calc();
}
function escapeAttr(s){return String(s).replaceAll('&','&amp;').replaceAll('"','&quot;').replaceAll('<','&lt;').replaceAll('>','&gt;')}
function calc(){const months=getCurrentMonths();const t=totals(months);el('myGrossTotal').textContent=yen(t.myGross);el('myTakeTotal').textContent=yen(t.myTake);el('wifeGrossTotal').textContent=yen(t.wifeGross);el('wifeTakeTotal').textContent=yen(t.wifeTake);el('houseGrossTotal').textContent=yen(t.myGross+t.wifeGross);el('houseTakeTotal').textContent=yen(t.myTake+t.wifeTake);el('avgGross').textContent=yen((t.myGross+t.wifeGross)/12);el('avgTake').textContent=yen((t.myTake+t.wifeTake)/12);months.forEach((m,i)=>{el('sum_'+i).textContent='月合計 '+yen((m.myGross||0)+(m.wifeGross||0))});updateWifeStatus(t.wifeGross)}
function updateWifeStatus(wifeIncome){const box=el('wifeStatus');box.className='status';let msg='';if(!wifeIncome){box.classList.add('ok');msg='妻の年収を入力するとライン判定します。'}else if(wifeIncome<=1300000){box.classList.add('ok');msg='妻の年収：130万円以内です。扶養ラインを意識するなら安全寄り。'}else if(wifeIncome<=1500000){box.classList.add('warn');msg='妻の年収：130万円超〜150万円以内です。社会保険や扶養の確認が必要。'}else if(wifeIncome<=1800000){box.classList.add('warn');msg='妻の年収：150万円超〜180万円以内です。働き損にならないか確認したいライン。'}else{box.classList.add('danger');msg='妻の年収：180万円超です。扶養より世帯手取り重視で考えるライン。'}box.textContent=msg;el('lineList').innerHTML=[1300000,1500000,1800000].map(line=>{const diff=line-wifeIncome;const text=diff>=0?`あと ${yen(diff)}`:`${yen(Math.abs(diff))} 超過`;return `<div class="line-item"><strong>${line/10000}万円ライン</strong><span>${text}</span></div>`}).join('')}
function makeRecord(){const months=getCurrentMonths();const t=totals(months);return{year:currentYear(),months,memo:el('yearMemo').value.trim(),myIncome:t.myGross,myTakeHome:t.myTake,wifeIncome:t.wifeGross,wifeTakeHome:t.wifeTake,updatedAt:new Date().toLocaleString('ja-JP')}}
function saveCurrentYear(showAlert=false){const record=makeRecord();let records=loadRecords();const idx=records.findIndex(r=>Number(r.year)===Number(record.year));if(idx>=0)records[idx]=record;else records.push(record);records.sort((a,b)=>Number(b.year)-Number(a.year));storeRecords(records);renderRecords();if(showAlert)alert('保存しました')}
let saveTimer=null;function autoSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveCurrentYear(false),400)}
function loadYear(year){const r=loadRecords().find(x=>Number(x.year)===Number(year));el('year').value=year;el('yearMemo').value=r?.memo||'';renderMonths(r?.months||blankMonths());showTab('input');scrollTo({top:0,behavior:'smooth'})}
function clearCurrentYear(){if(!confirm(currentYear()+'年の入力をクリアしますか？'))return;el('yearMemo').value='';renderMonths(blankMonths());saveCurrentYear(false)}
function renderRecords(){const records=loadRecords();const area=el('recordsArea');if(!records.length){area.innerHTML='<div class="empty">まだ記録がありません</div>';return}area.innerHTML=`<table class="records-table"><thead><tr><th>年</th><th>世帯年収</th><th>世帯手取り</th><th>妻年収</th><th>操作</th></tr></thead><tbody>${records.map(r=>`<tr><td>${r.year}</td><td>${yen((r.myIncome||0)+(r.wifeIncome||0))}</td><td>${yen((r.myTakeHome||0)+(r.wifeTakeHome||0))}</td><td>${yen(r.wifeIncome)}</td><td><div class="actions"><button class="mini gray" onclick="loadYear(${r.year})">開く</button><button class="mini red" onclick="deleteRecord(${r.year})">削除</button></div></td></tr>`).join('')}</tbody></table>`}
function deleteRecord(year){if(!confirm(year+'年の記録を削除しますか？'))return;storeRecords(loadRecords().filter(r=>Number(r.year)!==Number(year)));renderRecords()}
function deleteAll(){if(!confirm('すべての記録を削除しますか？'))return;localStorage.removeItem(KEY);renderRecords();renderMonths(blankMonths())}
function exportData(){const text=JSON.stringify(loadRecords(),null,2);el('importText').value=text;if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>alert('バックアップをコピーしました')).catch(()=>alert('下の欄に表示しました。手動でコピーしてください'))}else alert('下の欄に表示しました。手動でコピーしてください')}
function importData(){try{const data=JSON.parse(el('importText').value);if(!Array.isArray(data))throw new Error();storeRecords(data);renderRecords();alert('読込しました')}catch{alert('読込できません。バックアップ文字を確認してください。')}}
function showTab(tab){el('inputSection').classList.toggle('hidden',tab!=='input');el('recordsSection').classList.toggle('hidden',tab!=='records');el('tabInput').classList.toggle('active',tab==='input');el('tabRecords').classList.toggle('active',tab==='records');if(tab==='records')renderRecords()}
function loadPresetSheetData(){
 const data={
  2021:{myTake:[291015,310306,287407,301692,284738,306270,357674,285370,318498,338023,348612,343772,448849,554055],myGross:[376414,397858,372544,388106,369626,380020,451500,357001,393368,414275,428577,423852,579500,418990]},
  2022:{myTake:[352157,343502,293889,371343,353024,331408,446347,352023,345314,322040,337628,315582,401188,528358],myGross:[432725,424062,370014,453200,434513,413456,576300,435977,428938,402805,429673,403729,507600,378941]},
  2023:{myTake:[349124,320545,352998,342054,334431,325275,401564,45981,341492,311071,338475,400920,366058,533667],myGross:[443032,410072,449867,435633,424503,407850,497600,66580,436219,401499,428883,495920,496800,409896]},
  2024:{myTake:[367132,374506,346986,402243,364520,401207,470446,383728,356626,341831,343830,385773,423297,460117],myGross:[458417,466982,436429,495893,456353,464539,574300,454701,427033,411746,422278,464515,538100,434424]},
  2025:{myTake:[396970,387587,371574,435085,416550,400795,391386,389586,418833,331168,375151,375512,382967,613537],myGross:[488606,480444,461306,531282,510482,506405,531000,492067,524351,426579,487014,488714,519500,420971],wifeGross:[101420,113540,99065,89360,108190,118935,0,127690,128860,103130,111450,120540,0,59510]},
  2026:{myTake:[362636,360267,350183,389206,360304,375863,0,0,0,0,0,0,0,0],myGross:[471775,471193,457584,497261,465640,487348,0,0,0,0,0,0,0,0],wifeGross:[102210,94930,100172,134860,132730,110623,0,0,0,0,0,0,0,0]}
 };
 let records=loadRecords();
 Object.entries(data).forEach(([year,d])=>{const months=MONTHS.map((name,i)=>({name,myGross:d.myGross[i]||0,myTake:d.myTake[i]||0,wifeGross:d.wifeGross?d.wifeGross[i]||0:0,wifeTake:0,memo:''}));const t=totals(months);const record={year:Number(year),months,memo:'スプレッドシートから取込',myIncome:t.myGross,myTakeHome:t.myTake,wifeIncome:t.wifeGross,wifeTakeHome:t.wifeTake,updatedAt:new Date().toLocaleString('ja-JP')};const idx=records.findIndex(r=>Number(r.year)===Number(year));if(idx>=0)records[idx]=record;else records.push(record)});
 records.sort((a,b)=>Number(b.year)-Number(a.year));storeRecords(records);renderRecords();alert('2021〜2026年を登録しました')
}

function seedPresetSheetDataIfEmpty(){
 const existing = loadRecords();
 if(existing.length) return;
 const data={
  2021:{myTake:[291015,310306,287407,301692,284738,306270,357674,285370,318498,338023,348612,343772,448849,554055],myGross:[376414,397858,372544,388106,369626,380020,451500,357001,393368,414275,428577,423852,579500,418990]},
  2022:{myTake:[352157,343502,293889,371343,353024,331408,446347,352023,345314,322040,337628,315582,401188,528358],myGross:[432725,424062,370014,453200,434513,413456,576300,435977,428938,402805,429673,403729,507600,378941]},
  2023:{myTake:[349124,320545,352998,342054,334431,325275,401564,45981,341492,311071,338475,400920,366058,533667],myGross:[443032,410072,449867,435633,424503,407850,497600,66580,436219,401499,428883,495920,496800,409896]},
  2024:{myTake:[367132,374506,346986,402243,364520,401207,470446,383728,356626,341831,343830,385773,423297,460117],myGross:[458417,466982,436429,495893,456353,464539,574300,454701,427033,411746,422278,464515,538100,434424]},
  2025:{myTake:[396970,387587,371574,435085,416550,400795,391386,389586,418833,331168,375151,375512,382967,613537],myGross:[488606,480444,461306,531282,510482,506405,531000,492067,524351,426579,487014,488714,519500,420971],wifeGross:[101420,113540,99065,89360,108190,118935,0,127690,128860,103130,111450,120540,0,59510]},
  2026:{myTake:[362636,360267,350183,389206,360304,375863,0,0,0,0,0,0,0,0],myGross:[471775,471193,457584,497261,465640,487348,0,0,0,0,0,0,0,0],wifeGross:[102210,94930,100172,134860,132730,110623,0,0,0,0,0,0,0,0]}
 };
 const records=[];
 Object.entries(data).forEach(([year,d])=>{
   const months=MONTHS.map((name,i)=>({name,myGross:d.myGross[i]||0,myTake:d.myTake[i]||0,wifeGross:d.wifeGross?d.wifeGross[i]||0:0,wifeTake:0,memo:''}));
   const t=totals(months);
   records.push({year:Number(year),months,memo:'スプレッドシートから自動入力済み',myIncome:t.myGross,myTakeHome:t.myTake,wifeIncome:t.wifeGross,wifeTakeHome:t.wifeTake,updatedAt:new Date().toLocaleString('ja-JP')});
 });
 records.sort((a,b)=>Number(b.year)-Number(a.year));
 storeRecords(records);
}

seedPresetSheetDataIfEmpty();
el('year').value=2026;el('year').addEventListener('input',()=>{const r=loadRecords().find(x=>Number(x.year)===currentYear());el('yearMemo').value=r?.memo||'';renderMonths(r?.months||blankMonths())});el('unitMode').addEventListener('change',()=>{const months=getCurrentMonths();renderMonths(months)});el('yearMemo').addEventListener('input',autoSave);const first=loadRecords().find(r=>Number(r.year)===currentYear());el('yearMemo').value=first?.memo||'';renderMonths(first?.months||blankMonths());renderRecords();
</script>
</body>
</html>
